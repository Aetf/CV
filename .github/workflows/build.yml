name: Build and Publish CV

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Install Just
      uses: taiki-e/install-action@v2
      with:
        tool: just

    - name: Cache Tectonic
      uses: actions/cache@v4
      with:
        path: build/cache
        key: ${{ runner.os }}-tectonic-${{ hashFiles('**/*.tex') }}
        restore-keys: |
          ${{ runner.os }}-tectonic-

    - name: Log in to the Container registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build PDFs using Just
      run: just

    - name: Push image to GHCR
      run: podman push ghcr.io/aetf/cv:latest
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    - name: Upload CV Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cv-pdf
        path: build/cv.pdf

    - name: Upload Resume Artifact
      uses: actions/upload-artifact@v4
      with:
        name: resume-pdf
        path: build/resume.pdf

    - name: Update tag to current commit
      uses: actions/github-script@v7
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      with:
        script: |
          const tagName = 'latest';
          try {
            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tagName}`,
              sha: context.sha,
              force: true
            });
            console.log(`Updated tag ${tagName} to ${context.sha}`);
          } catch (error) {
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tagName}`,
              sha: context.sha
            });
            console.log(`Created tag ${tagName} at ${context.sha}`);
          }

    - name: Create/Update Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      with:
        tag_name: latest
        name: Latest Continuous Build
        body: Automated build from latest commit.
        files: |
          build/cv.pdf
          build/resume.pdf
        prerelease: true
