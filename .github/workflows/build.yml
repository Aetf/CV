name: Build and Publish CV

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Just
      uses: extra-actions/setup-just@v1

    - name: Build PDFs using Just
      run: just

    - name: Upload CV Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cv-pdf
        path: build/cv.pdf

    - name: Upload Resume Artifact
      uses: actions/upload-artifact@v4
      with:
        name: resume-pdf
        path: build/resume.pdf
