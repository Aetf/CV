name: Build and Publish CV

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Tectonic
      uses: wtfjoke/setup-tectonic@v4
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install Biber and Biblatex
      run: sudo apt-get update && sudo apt-get install -y biber texlive-bibtex-extra

    - name: Build CV
      run: |
        mkdir -p build
        tectonic -Z search-path=/usr/share/texlive/texmf-dist/tex/latex/biblatex -Z search-path=cv/lib -o build cv/cv.tex

    - name: Build Resume
      run: |
        mkdir -p build
        tectonic -Z search-path=resume/lib -o build resume/resume.tex

    - name: Upload CV Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cv-pdf
        path: build/cv.pdf

    - name: Upload Resume Artifact
      uses: actions/upload-artifact@v4
      with:
        name: resume-pdf
        path: build/resume.pdf
